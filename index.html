<!DOCTYPE html>
<html lang="uk">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>UkrFreestyle</title>
        <!--Open Graph-->
        <meta property="og:title" content="UkrFreestyle" />
        <meta property="og:description" content="Офіційний сайт команди UkrFreestyle" />
        <meta property="og:image" content="images/og-image.jpg" />
        <meta property="og:url" content="https://ukrfreestyle.com" />
        <meta property="og:type" content="website" />

        <!-- Styles -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
        />
        <link rel="stylesheet" href="/css/styles.css" />
    </head>
    <body>
        <header>
            <div class="container header__container">
                <!-- Logo -->
                <a href="#" class="header__logo">
                    <img src="/images/logo/ukrfreestyle-logo.png" alt="UkrFreestyle Logo" />
                </a>

                <!-- Navigation -->
                <nav class="header__nav">
                    <ul class="header__list">
                        <li><a href="#about" class="header__link">Про нас</a></li>
                        <li><a href="#news" class="header__link">Новини</a></li>
                        <li><a href="#training" class="header__link">Тренування</a></li>
                        <li><a href="#clients" class="header__link">Клієнти</a></li>
                        <li><a href="#contacts" class="header__link">Контакти</a></li>
                    </ul>
                </nav>

                <!-- Contact button and lang switch -->
                <div class="header__actions">
                    <button class="btn header__btn">Зв'язатись з нами</button>
                    <div class="header__lang">
                        <span class="header__lang-item active">UA</span>
                        <span class="header__lang-divider"></span>
                        <span class="header__lang-item">EN</span>
                    </div>
                </div>

                <!-- Burger menu for mobile devices -->
                <div class="header__burger">
                    <span></span>
                </div>
            </div>
        </header>

        <main></main>

        <footer></footer>
    </body>
</html>
